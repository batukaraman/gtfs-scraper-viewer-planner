# Transit API Gateway with On-Demand OTP
#
# OTP containers are managed dynamically by the gateway.
# This file only defines the gateway service.
#
# Usage:
#   Start gateway:  docker compose up -d gateway
#   View logs:      docker compose logs -f gateway
#   Stop:           docker compose down
#
# The gateway will automatically start/stop OTP containers as needed.
# OTP containers are named: otp_<city_id> (e.g., otp_istanbul)

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: transit_gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - GATEWAY_CONFIG=/app/config/cities.yaml
      - GATEWAY_DATA_DIR=/app/data
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8000
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Note: OTP containers are created dynamically by the gateway
# They will have names like: otp_istanbul, otp_berlin, etc.
# Ports are assigned from cities.yaml configuration
