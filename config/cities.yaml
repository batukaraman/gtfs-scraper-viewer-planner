# GTFS Pipeline Configuration
# Her ülke ve şehir için GTFS kaynakları ve OSM ayarları

countries:
  turkey:
    name: Türkiye
    osm:
      source: https://download.geofabrik.de/europe/turkey-latest.osm.pbf
      filename: turkey-latest.osm.pbf

    cities:
      istanbul:
        name: İstanbul
        timezone: Europe/Istanbul
        language: tr
        bbox:
          min_lon: 27.90
          min_lat: 40.72
          max_lon: 30.12
          max_lat: 41.58
        sources:
          - type: easyway
            city_code: istanbul
            base_url: https://tr.easyway.info/ajax/tr
        otp:
          memory: 8g
          port: 8080

